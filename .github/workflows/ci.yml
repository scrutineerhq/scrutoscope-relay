name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax check
        run: npm run check

      - name: Build check (wrangler dry-run)
        run: npm run build

      - name: Unit tests
        run: npm test

  e2e:
    name: Browser QA (relay viewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Viewer e2e (XSS + security headers, vs wrangler dev)
        run: npm run test:e2e
        env:
          WRANGLER_SEND_METRICS: 'false'

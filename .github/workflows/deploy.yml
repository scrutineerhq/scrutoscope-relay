name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: node --input-type=module --check < worker.js

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 10
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://scrutinizer.dev/)
          if [ "$STATUS" != "200" ]; then echo "Root failed: $STATUS"; exit 1; fi
          echo "✅ Smoke test passed (root 200)"
